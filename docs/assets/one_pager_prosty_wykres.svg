  <text x="115" y="188" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#1e293b">1. Wybierz stacje  |  2. Otworz zakladke Wizualizacja  |  3. Kliknij Refresh series</text>
  <rect x="90" y="245" width="300" height="390" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
