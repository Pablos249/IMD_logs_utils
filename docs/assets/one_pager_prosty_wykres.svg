  <text x="362" y="304" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">1</text>
  <text x="115" y="592" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Zaznacz jedna lub kilka serii.</text>
  <rect x="430" y="245" width="650" height="390" rx="18" fill="#fffef8" stroke="#94a3b8" stroke-width="2"/>
