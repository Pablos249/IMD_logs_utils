  <text x="128" y="342" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e293b">IMD | imd_voltage | CCS1 [V]</text>
  <rect x="115" y="372" width="250" height="42" rx="8" fill="#dbeafe"/>
  <text x="128" y="399" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e293b">EOS | current_outlet | session [A]</text>
  <rect x="115" y="429" width="250" height="42" rx="8" fill="#e2e8f0"/>
  <text x="128" y="456" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#1e293b">CLC | rectifier_voltage | DC [V]</text>
