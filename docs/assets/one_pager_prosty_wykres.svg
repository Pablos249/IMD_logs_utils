  <text x="462" y="304" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">2</text>
  <text x="500" y="605" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Po kliknieciu przycisku wykres pojawia sie po prawej stronie.</text>
  <text x="60" y="725" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">Jesli lista serii jest pusta, najpierw sprawdz stacje i kliknij Refresh series.</text>
