<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#f8fafc"/>
  <text x="60" y="60" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" fill="#1e293b">Jak analizowac wykres po narysowaniu</text>
  <rect x="60" y="110" width="1080" height="580" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <rect x="90" y="145" width="1020" height="80" rx="16" fill="#f1f5f9"/>
  <text x="115" y="190" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#1e293b">Start slider  |  End slider  |  More points in view  |  Snap clicks to sample + logs</text>
  <rect x="90" y="255" width="700" height="360" rx="18" fill="#fffef8" stroke="#94a3b8" stroke-width="2"/>
  <line x1="140" y1="565" x2="735" y2="565" stroke="#64748b" stroke-width="3"/>
  <line x1="140" y1="305" x2="140" y2="565" stroke="#64748b" stroke-width="3"/>
  <path d="M165 540 C250 520, 300 430, 370 450 S480 560, 560 520 S650 370, 710 390" fill="none" stroke="#2563eb" stroke-width="5"/>
  <line x1="300" y1="305" x2="300" y2="565" stroke="#2563eb" stroke-width="4"/>
  <line x1="585" y1="305" x2="585" y2="565" stroke="#be185d" stroke-width="4"/>
  <circle cx="300" cy="282" r="22" fill="#2563eb"/>
  <text x="292" y="291" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">1</text>
  <circle cx="585" cy="282" r="22" fill="#be185d"/>
  <text x="577" y="291" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">2</text>
  <text x="115" y="610" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">Lewy klik ustawia marker lewy, prawy klik marker prawy.</text>
  <rect x="830" y="255" width="250" height="360" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="855" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#1e293b">Co dalej?</text>
  <text x="855" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">1. Zawez zakres czasu</text>
  <text x="855" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">2. Dograj wiecej punktow</text>
  <text x="855" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">3. Sprawdz delte markerow</text>
  <text x="855" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">4. Otworz logi wokol punktu</text>
  <text x="855" y="480" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">5. Ustaw reczna skale Y</text>
  <text x="855" y="535" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">To najlepszy tryb do szukania</text>
  <text x="855" y="560" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#334155">przyczyny pojedynczego zdarzenia.</text>
  <text x="60" y="725" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#334155">Przy wlaczonym Snap clicks to sample + logs aplikacja pokazuje wpisy najblizsze wybranemu punktowi.</text>
</svg>
